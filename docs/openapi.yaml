                      _id: "67detrans1234567890abc1"
                      businessName: "North Haul Logistics Ltd"
                    fleetBid:
                      _id: "67defleetbid1234567890abc"
                      amount: 180000
                      counterAmount: 210000
                      status: "accepted"
    post:
      summary: Create fleet payment
      description: Buyer creates a fleet payment record from an accepted fleet bid or the fleet listed price. This supports manual approval flows like cash or bank transfer. The endpoint also creates or reuses a linked fleet booking in `pending_payment` state.
      parameters:
        - in: path
