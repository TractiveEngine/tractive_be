  /api/transporters/fleet/{id}/payments:
    get:
      summary: List fleet payments for a fleet
      description: Buyer sees their own fleet payments for the fleet. Fleet owner transporter sees all payments for that fleet. Admin can also view all payments. Use truck detail/list endpoints to read `remainingCapacityKg`, `remainingCapacityTonnes`, and `remainingCapacityDisplay` before submitting a payment.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Fleet payments list
          content:
            application/json:
              example:
                success: true
                data:
                  - _id: "67defleetpay1234567890abc"
                    amount: 210000
                    loadWeightKg: 5000
                    loadWeightTonnes: 5
                    wholeTruckOnly: false
                    paymentMethod: "bank_transfer"
                    status: "pending"
                    buyer:
                      _id: "67debuyer1234567890abc0"
                      name: "Buyer One"
                      email: "buyer@example.com"
                    transporter:
                      _id: "67detrans1234567890abc1"
                      businessName: "North Haul Logistics Ltd"
                    fleetBid:
                      _id: "67defleetbid1234567890abc"
                      amount: 180000
                      counterAmount: 210000
                      status: "accepted"
    post:
      summary: Create fleet payment
      description: Buyer creates a fleet payment record either from an accepted fleet bid or directly from the fleet listed price. `fleetBidId` is optional and is not needed for the normal direct-pay flow. This supports manual approval flows like cash or bank transfer. The endpoint also creates or reuses a linked fleet booking in `pending_payment` state. Preferred payload is `shipmentItems`, where the backend computes total load from selected paid order items and rejects the request when that total exceeds the truck's current remaining capacity. For order-linked transport, send `shipmentItems` with `orderId`, `productId`, and `quantity` or `quantityToShip`. Do not send `loadWeightKg` together with `shipmentItems`. Use `loadWeightKg` only for manual freight loads not tied to paid order items. Supported shipment units for conversion are `kg`, `tonne`, `50kg_bag`, and `100kg_bag`. If the truck pricing model is `flat_rate_whole_truck`, approval reserves the full truck and the fleet is treated as whole-truck-only.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                fleetBidId:
                  type: string
                  description: Optional. Only send this when paying against an accepted fleet bid. Omit it for direct payment.
                amount:
                  type: number
                  description: Optional. If provided, it must match the backend-computed payable amount exactly.
                loadWeightKg:
                  type: number
                  description: Use only for manual freight loads that are not tied to `shipmentItems`. Do not send when `shipmentItems` are present.
                shipmentItems:
                  type: array
                  items:
                    type: object
                    properties:
                      orderId:
                        type: string
                      productId:
                        type: string
                      quantity:
                        type: number
                      quantityToShip:
                        type: number
                        description: Alias of `quantity`. Recommended UI field for direct transport payment from paid order items.
                      unitWeightKg:
                        type: number
                        description: Optional fallback for bag-based products when the product/order snapshot does not already carry unitWeightKg.
                paymentMethod:
                  type: string
                  enum: [cash, bank_transfer, card]
                note:
                  type: string
            example:
              shipmentItems:
                - orderId: "67deorder1234567890abc1"
                  productId: "67deprod1234567890abc1"
                  quantityToShip: 100
              paymentMethod: "bank_transfer"
              note: "Direct pay for Kaduna to Lagos route"
      responses:
        '201':
          description: Fleet payment created
          content:
            application/json:
              example:
                success: true
                data:
                  _id: "67defleetpay1234567890abc"
                  amount: 150000
                  loadWeightKg: 10000
                  loadWeightTonnes: 10
                  equivalent50kgBags: 200
                  equivalent100kgBags: 100
                  loadDisplay: "10 tonnes"
                  wholeTruckOnly: false
                  shipmentItems:
                    - orderId: "67deorder1234567890abc1"
                      productId: "67deprod1234567890abc1"
                      productName: "Maize"
                      quantity: 100
                      unit: "100kg_bag"
                      unitWeightKg: 100
                      loadWeightKg: 10000
                      loadWeightTonnes: 10
                      equivalent50kgBags: 200
                      equivalent100kgBags: 100
                      loadDisplay: "10 tonnes"
                  paymentMethod: "bank_transfer"
                  status: "pending"
                  fleetBid: null
                  booking:
                    _id: "67defleetbooking1234567890ab"
                    status: "pending_payment"
                    loadWeightKg: 10000
                    wholeTruckOnly: false
        '400':
          description: Load exceeds remaining capacity, unsupported shipment unit, or shipmentItems/loadWeightKg invalid
          content:
            application/json:
              examples:
                mixed_payload:
                  summary: Reject mixed shipmentItems and raw load weight
                  value:
                    success: false
                    message: "Do not send loadWeightKg when shipmentItems are provided. The backend derives total load from the selected order quantities."
                capacity_exceeded:
                  summary: Reject load above remaining capacity
                  value:
                    success: false
                    message: "Selected load exceeds the truck remaining capacity"
                    data:
                      requestedLoadKg: 7000
                      remainingCapacityKg: 5000
                      remainingCapacityDisplay: "5 tonnes"
        '409':
          description: Whole-truck fleet already reserved or in use
          content:
            application/json:
              example:
                success: false
                message: "This fleet only accepts whole-truck bookings and is already reserved or in use"
                data:
                  pricingModel: "flat_rate_whole_truck"
                  wholeTruckOnly: true
                  priceUnitLabel: "whole truck"
                  currentLoadKg: 20000
                  capacityKg: 20000
