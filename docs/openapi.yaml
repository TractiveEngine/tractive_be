  /api/transporters:
    get:
      summary: List transporters
      description: Buyer/admin transporter discovery endpoint for the transporter listing page. Returns transporter profile plus summary metrics like rating, reviewsCount, totalSales, deliveriesCount, location, and years of experience. Supports buyer-side filtering by transporter rating, Nigerian state/location, years of experience, and fleet availability/size.
      parameters:
        - in: query
          name: search
          schema:
            type: string
          description: Search by transporter name, business name, or email.
        - in: query
          name: state
          schema:
            type: string
          description: Filter by Nigerian state, for example `Lagos`, `Kaduna`, `Kano`, or `Abuja`.
        - in: query
          name: location
          schema:
            type: string
          description: Alias of `state` for buyer-side location filtering, for example `Lagos`.
        - in: query
          name: rating
          schema:
            type: number
          description: Minimum transporter rating. Use values like `5`, `4`, or `3` to only return transporters at or above that rating.
        - in: query
          name: yearsOfExperience
          schema:
            type: integer
          description: Minimum years of experience derived from transporter account age, for example `1`, `3`, or `5`.
        - in: query
          name: availability
          schema:
            type: string
            enum: [available, on_transit, under_maintenance]
          description: Returns transporters that have at least one fleet matching this availability. Valid values are `available`, `on_transit`, and `under_maintenance`.
        - in: query
          name: size
          schema:
            type: string
          description: Returns transporters that have at least one fleet matching this size or capacity query, for example `20 tons`, `30 tons`, `lorry`, or `truck`.
