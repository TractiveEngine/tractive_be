      responses:
        '200':
          description: Checkout summary
          content:
            application/json:
              example:
                success: true
                data:
                  bids:
                    - _id: "67debid1234567890abcdef"
                      amount: 4500
                      status: "accepted"
                      quantity: 20
                      product:
                        _id: "67deprod1234567890abcd1"
                        name: "Maize"
                        price: 5000
                        category: "Grains"
                        subcategory: "Maize"
                        categories: ["Grains", "Maize"]
                        localTransport:
                          required: true
                          fee: 2500
                          from: "Kachia Farm"
                          to: "Kaduna Aggregation Point"
                          note: "Farm gate pickup to interstate loading point"
                      agent:
                        _id: "67deagent1234567890abc1"
                        name: "Seller One"
                        email: "seller@example.com"
                  productsSubtotal: 4500
                  localTransportTotal: 2500
                  totalAmount: 7000
