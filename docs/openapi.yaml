  /api/orders:
    get:
      summary: List orders for buyer, agent, or admin
      description: Buyer gets own orders. Agent gets orders containing the agent's products. Admin can use the same route for system-wide order listing. `readyForTransport=true` returns paid orders waiting for transport and is sorted newest first.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: limit
          schema:
            type: integer
        - in: query
          name: status
          schema:
            type: string
            enum: [pending, payment_pending, paid, delivered]
          description: Filter buyer orders by order payment state.
        - in: query
          name: transportStatus
          schema:
            type: string
            enum: [pending, picked, on_transit, delivered]
          description: Filter buyer orders by shipping stage.
        - in: query
          name: readyForTransport
          schema:
            type: boolean
          description: Use `true` to return only orders that are paid and not yet shipped, which is the correct dataset for the transporter selection page.
        - in: query
          name: buyerId
          schema:
            type: string
          description: Admin-only filter for a specific buyer.
      responses:
        '200':
          description: List of orders
    post:
      summary: Create order
      description: Use this after `/api/buyers/biddings/won` or `/api/buyers/biddings/won/checkout` to create an order from accepted bids. Requires `activeRole` to be `buyer`. `totalAmount` must include accepted bid totals plus any seller-configured local transport fees on the selected products.
      security:
        - bearerAuth: []
      parameters:
        - in: header
          name: Idempotency-Key
          schema:
            type: string
          description: Prevent duplicate orders on retry. Reuse the same key to get the existing order.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Order'
            example:
              products:
                - product: "507f1f77bcf86cd799439013"
                  quantity: 10
              totalAmount: 52500
              address: "123 Delivery Street, Abuja"
              transportStatus: "pending"
              bidIds:
                - "507f1f77bcf86cd799439099"
      responses:
        '201':
          description: Order created
