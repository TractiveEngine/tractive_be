  /api/buyers/biddings/won/checkout:
    get:
      summary: Buyer checkout summary for won bids
      description: Requires activeRole `buyer`. Returns accepted bids that are still eligible for checkout and their total amount. Bids already used in a paid order are excluded. The response separates product bid subtotal from seller-configured local transport subtotal. This is a summary endpoint only; it does not create an order or payment record.
      responses:
        '200':
          description: Checkout summary
          content:
            application/json:
              example:
                success: true
                data:
                  bids:
                    - _id: "67debid1234567890abcdef"
                      amount: 4500
                      status: "accepted"
                      quantity: 20
                      product:
                        _id: "67deprod1234567890abcd1"
                        name: "Maize"
                        price: 5000
                        category: "Grains"
                        subcategory: "Maize"
                        categories: ["Grains", "Maize"]
                        localTransport:
                          required: true
                          fee: 2500
                          from: "Kachia Farm"
                          to: "Kaduna Aggregation Point"
                          note: "Farm gate pickup to interstate loading point"
                      agent:
                        _id: "67deagent1234567890abc1"
                        name: "Seller One"
                        email: "seller@example.com"
                  productsSubtotal: 4500
                  localTransportTotal: 2500
                  totalAmount: 7000
    post:
      summary: Buyer checkout summary for won bids (alias)
      description: Frontend compatibility alias for `GET`. Do not send a request body. To actually proceed with payment, call `POST /api/orders` and then `POST /api/transactions`.
      responses:
        '200':
          description: Checkout summary
          content:
            application/json:
              example:
                success: true
                data:
                  bids:
                    - _id: "67debid1234567890abcdef"
                      amount: 4500
                      status: "accepted"
                      quantity: 20
                      product:
                        _id: "67deprod1234567890abcd1"
                        name: "Maize"
                        localTransport:
                          required: true
                          fee: 2500
                          from: "Kachia Farm"
                          to: "Kaduna Aggregation Point"
                  productsSubtotal: 4500
                  localTransportTotal: 2500
                  totalAmount: 7000
