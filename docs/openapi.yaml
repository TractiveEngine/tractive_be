        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Success
    patch:
      summary: PATCH /api/bids/{id}
      description: |
        Product bid update endpoint.
        - Agent can `accept`, `reject`, or `counter` a buyer's product bid by setting `status` to `accepted`, `rejected`, or `countered`.
        - When countering, agent must provide `counterOffer`.
        - Buyer can use the same endpoint to accept or reject a countered bid by sending `status: accepted` or `status: rejected`.
        - Buyer can also submit a fresh offer on the same `bidId` by sending a new `amount` while the bid is `countered`.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
            example:
              status: "countered"
              counterOffer: 4700
              message: "Best I can do is 4700"
      responses:
        '200':
          description: Success

