  /api/transporters/orders/{orderId}/tracking:
    get:
      summary: Get tracking timeline for order
      description: Shared tracking read endpoint for the transport flow. Although it lives under `/api/transporters/...`, it can be used by the buyer who owns the order, the assigned transporter, any seller/agent attached to a product in the order, or an admin. For legacy orders it returns order-level tracking events. For trip-backed orders it resolves through the linked fleet trip and may include `fleetTripId`, `fleetId`, `trackingCode`, and `currentLocation`.
      parameters:
        - in: path
          name: orderId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Tracking info with timeline
          content:
            application/json:
              example:
                success: true
                data:
                  orderId: "67deorder1234567890abc1"
                  fleetTripId: "67detrip1234567890abc1"
                  fleetId: "67defleet1234567890abc1"
                  trackingCode: "TRIP-1001"
                  transportStatus: "on_transit"
                  currentLocation: "Enugu"
                  timeline:
                    - status: "pending"
                      timestamp: "2026-03-23T10:00:00.000Z"
                      note: ""
                      location: ""
                    - status: "picked"
                      timestamp: "2026-03-24T08:15:00.000Z"
                      note: "Goods loaded"
                      location: "Abia"
                    - status: "on_transit"
                      timestamp: "2026-03-24T14:30:00.000Z"
                      note: "En route to buyer"
                      location: "Enugu"
        '403':
          description: Caller is not the buyer, assigned transporter, seller on the order, or admin
  /api/transporters/fleet-trips:
    get:
      summary: List fleet trips
      description: Trip-based operational tracking board for transporters and admins. Use this for tracking tabs such as new, picked, in transit, or delivered when multiple orders/buyers can share one truck trip.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [planned, loaded, on_transit, arrived, delivered, cancelled]
        - in: query
          name: fleetId
          schema:
            type: string
        - in: query
          name: search
          schema:
            type: string
          description: Matches tracking code.
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: limit
          schema:
            type: integer
      responses:
        '200':
          description: Fleet trip list
          content:
            application/json:
              example:
                success: true
                data:
                  - _id: "67detrip1234567890abc1"
                    fleet:
                      _id: "67defleet1234567890abc1"
                      plateNumber: "ABC-123"
                      fleetName: "North Route Fleet"
                      fleetNumber: "ABC-123"
                      model: "Volvo"
                      route:
                        fromState: "Abia"
                        toState: "Anambra"
                    driver:
                      _id: "67dedriver1234567890abc1"
                      name: "Driver John"
                      phone: "+2348000000000"
                      trackingNumber: "TRK-1001"
                    buyerIds:
                      - _id: "67debuyer1234567890abc1"
                        name: "Buyer One"
                        phone: "+2348011111111"
                    orderIds:
                      - _id: "67deorder1234567890abc1"
                        buyer: "67debuyer1234567890abc1"
                        transportStatus: "on_transit"
                    status: "planned"
                    origin: "Abia"
                    destination: "Anambra"
                    currentLocation: "Abia"
                    trackingCode: "TRIP-1001"
                    loadWeightKg: 10000
                    loadWeightTonnes: 10
                    wholeTruckOnly: false
                    buyerCount: 1
                    orderCount: 1
                    createdAt: "2026-05-03T10:00:00.000Z"
                    updatedAt: "2026-05-03T10:00:00.000Z"
                pagination:
                  page: 1
                  limit: 20
                  total: 1
                  totalPages: 1
        '403':
          description: Transporter or admin access required
    post:
      summary: Create fleet trip from confirmed bookings
      description: Manual trip creation for shared-load bookings. Whole-truck bookings are created automatically on payment approval, but shared-load confirmed bookings can be grouped into a trip with this endpoint. Frontend can either send `fleetId` plus explicit `bookingIds`, or send only `fleetId` to let backend include all confirmed unassigned bookings currently attached to that fleet.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fleetId]
              properties:
                fleetId:
                  type: string
                bookingIds:
                  type: array
                  items:
                    type: string
                  description: Optional explicit subset of confirmed bookings to include. If omitted, backend uses all confirmed unassigned bookings on the fleet.
                driverId:
                  type: string
                origin:
                  type: string
                destination:
                  type: string
            example:
              fleetId: "67defleet1234567890abc1"
              bookingIds:
                - "67debooking1234567890abc1"
                - "67debooking1234567890abc2"
              origin: "Abia"
              destination: "Anambra"
      responses:
        '201':
          description: Fleet trip created
        '400':
          description: Invalid fleet/booking payload or booking state
  /api/transporters/fleet-trips/{tripId}:
