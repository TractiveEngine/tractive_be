    post:
      summary: Create transaction for paid order
      description: Use this after creating an order. This endpoint records the buyer payment intent for an order. It requires `activeRole` `buyer`, requires `amount` to exactly match `order.totalAmount`, and reuses any existing pending or approved transaction for the same order instead of creating duplicates.
