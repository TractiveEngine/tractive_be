                      price: 250000
    post:
      summary: Create fleet price bid
      description: Requires activeRole `buyer`. Creates a price bid against a fleet or truck on the transporter page. The path `id` is the fleet id. Preferred payload is `shipmentItems`, where the backend derives total load from the selected paid order quantities. If `shipmentItems` are sent, do not send `loadWeightKg`. Use `loadWeightKg` only for manual freight loads not tied to paid order items.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                amount:
                  type: number
                proposedPrice:
                  type: number
                loadWeightKg:
                  type: number
                shipmentItems:
                  type: array
                  items:
                    type: object
                    properties:
                      orderId:
                        type: string
                      productId:
                        type: string
                      quantity:
                        type: number
                      quantityToShip:
                        type: number
                        description: Alias of `quantity`. Recommended UI field for transport selection from paid order items.
                      unitWeightKg:
                        type: number
                        description: Optional fallback for bag-based products when the product/order snapshot does not already carry unitWeightKg.
                message:
                  type: string
            example:
              amount: 180000
              shipmentItems:
                - orderId: "67deorder1234567890abc1"
                  productId: "67deprod1234567890abc1"
                  quantityToShip: 100
              message: "Can you do 180k for this route?"
      responses:
        '201':
          description: Fleet bid created
          content:
            application/json:
              example:
                success: true
                data:
                  _id: "67defleetbid1234567890abc"
                  amount: 180000
                  loadWeightKg: 10000
                  loadWeightTonnes: 10
                  equivalent50kgBags: 200
                  equivalent100kgBags: 100
                  loadDisplay: "10 tonnes"
                  status: "pending"
                  message: "Can you do 180k for this route?"
                  shipmentItems:
                    - orderId: "67deorder1234567890abc1"
                      productId: "67deprod1234567890abc1"
                      productName: "Maize"
                      quantity: 100
                      unit: "100kg_bag"
                      unitWeightKg: 100
                      loadWeightKg: 10000
                      loadWeightTonnes: 10
                      quantity: 100
                      unit: "100kg_bag"
                      unitWeightKg: 100
                      loadWeightKg: 10000
                      loadWeightTonnes: 10
                  buyer:
                    _id: "67debuyer1234567890abc1"
                    name: "Buyer One"
                  fleet:
                    _id: "67de1234abcd5678ef901234"
                    plateNumber: "ABC-123"
                    fleetName: "North Route Fleet"
