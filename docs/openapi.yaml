  /api/transporters/transactions:
    get:
      summary: Get transporter transactions
      description: Returns transactions for orders assigned to the authenticated transporter. Requires bearer auth with `activeRole` set to `transporter`. Supports filtering by transaction status and paginating the result set.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [pending, approved, rejected, refunded]
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: limit
          schema:
            type: integer
      responses:
        '200':
          description: Success
          content:
            application/json:
              example:
                success: true
                data:
                  - _id: "67detrx1234567890abc"
                    buyer:
                      id: "67debuyer1234567890abc1"
                      name: "Buyer One"
                      email: "buyer@example.com"
                      phone: "+2348000000000"
                    order:
                      id: "67deorder1234567890abc1"
                      totalAmount: 120000
                      status: "paid"
                      transportStatus: "pending"
                    amount: 120000
                    paymentMethod: "bank_transfer"
                    status: "pending"
                    approvedBy: null
                    createdAt: "2026-03-24T12:00:00.000Z"
                    updatedAt: "2026-03-24T12:00:00.000Z"
                pagination:
                  page: 1
                  limit: 20
                  total: 1
                  totalPages: 1
