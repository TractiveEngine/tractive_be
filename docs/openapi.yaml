            type: integer
        - in: query
          name: limit
          schema:
            type: integer
        - in: query
          name: status
          schema:
            type: string
            enum: [pending, payment_pending, paid, delivered]
          description: Filter buyer orders by order payment state.
        - in: query
          name: transportStatus
          schema:
            type: string
            enum: [pending, picked, on_transit, delivered]
          description: Filter buyer orders by shipping stage.
        - in: query
          name: readyForTransport
          schema:
            type: boolean
          description: Use `true` to return only orders that are paid and not yet shipped, which is the correct dataset for the transporter selection page.
