        - in: query
          name: availability
          schema:
            type: string
            enum: [available, on_transit, under_maintenance]
          description: Returns transporters that have at least one fleet matching this availability. Valid values are `available`, `on_transit`, and `under_maintenance`.
        - in: query
          name: size
          schema:
            type: string
