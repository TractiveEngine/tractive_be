  /api/sellers/{id}/products:
    get:
      summary: Seller products
      description: Returns products owned by this seller only, with optional pagination, status, search, `category`, and `subcategory` filters plus `wishlisted` for authenticated buyers.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: limit
          schema:
            type: integer
        - in: query
          name: status
          schema:
            type: string
            enum: [available, out_of_stock, discontinued]
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: category
          schema:
            type: string
          description: Filters products where `categories` contains this category value, e.g. `Grains`.
        - in: query
          name: subcategory
          schema:
            type: string
          description: Filters products where `categories` contains this subcategory value, e.g. `Rice`.
      responses:
        '200':
          description: Seller products
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Product'
                  pagination:
                    type: object
                    properties:
                      total:
                        type: integer
                      page:
                        type: integer
                      limit:
                        type: integer
              example:
                success: true
                data:
                  - _id: "67deprod1234567890abcd1"
                    name: "Maize"
                    description: "Fresh yellow maize"
                    price: 5000
                    quantity: 100
                    unit: "kg"
                    unitWeightKg: null
                    discount: 0
                    status: "available"
                    images:
                      - "https://example.com/maize1.jpg"
                    category: "Grains"
                    subcategory: "Maize"
                    categories:
                      - "Grains"
                      - "Maize"
                    wishlisted: false
                  - _id: "67deprod1234567890abcd2"
                    name: "Rice"
                    description: "Long grain rice"
                    price: 7000
                    quantity: 50
                    unit: "bag"
                    unitWeightKg: 50
                    discount: 5
                    status: "available"
                    images:
                      - "https://example.com/rice1.jpg"
                    category: "Grains"
                    subcategory: "Rice"
                    categories:
                      - "Grains"
                      - "Rice"
                    wishlisted: true
                pagination:
                  total: 2
                  page: 1
                  limit: 20
