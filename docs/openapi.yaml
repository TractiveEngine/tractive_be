openapi: 3.0.0
info:
  title: Tractive API
  version: 1.0.0
  description: API documentation for Tractive backend

servers:
  - url: http://localhost:3000

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        email:
          type: string
        name:
          type: string
        roles:
          type: array
          items:
            type: string
        activeRole:
          type: string
        isVerified:
          type: boolean
    Product:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        description:
          type: string
        price:
          type: number
        quantity:
          type: number
        unit:
          type: string
          description: Measurement unit for the quantity, for example `kg`, `ton`, or `bag`.
        unitWeightKg:
          type: number
          nullable: true
          description: Required when `unit` is `bag`. Defines how many kilograms one bag represents.
        discount:
          type: number
        images:
          type: array
          items:
            type: string
          description: Image URLs (Cloudinary/S3). No base64 data.
        videos:
          type: array
          items:
            type: string
          description: Video URLs (Cloudinary/S3). No base64 data.
        category:
          type: string
          nullable: true
        subcategory:
          type: string
          nullable: true
        categories:
          type: array
          items:
            type: string
          description: Normalized category list including category and subcategory.
        wishlisted:
          type: boolean
          description: True when the authenticated buyer has wishlisted the product.
        localTransport:
          type: object
          properties:
            required:
              type: boolean
            fee:
              type: number
            from:
              type: string
              nullable: true
            to:
              type: string
              nullable: true
            note:
              type: string
              nullable: true
    CategoryNode:
      type: object
      properties:
        name:
          type: string
        subcategories:
          type: array
          items:
            type: string
    Truck:
      type: object
      properties:
        _id:
          type: string
        plateNumber:
          type: string
        fleetName:
          type: string
        fleetNumber:
          type: string
        iot:
          type: string
          nullable: true
        model:
          type: string
        size:
          type: string
        capacity:
          type: string
        capacityKg:
          type: number
          nullable: true
        currentLoadKg:
          type: number
          nullable: true
        remainingCapacityKg:
          type: number
          nullable: true
        remainingCapacityDisplay:
          type: string
          nullable: true
        price:
          type: number
        pricingModel:
          type: string
          enum: [flat_rate_whole_truck, per_kg, per_tonne, per_50kg_bag, per_100kg_bag]
          description: How the fleet price should be interpreted.
        wholeTruckOnly:
          type: boolean
          description: True when the transporter only accepts the truck as a full-truck booking.
        estimatedDeliveryValue:
          type: number
          nullable: true
          description: Estimated delivery duration numeric value for this route.
        estimatedDeliveryUnit:
          type: string
          nullable: true
          enum: [hours, days]
        estimatedDeliveryText:
          type: string
          nullable: true
          description: Computed human-readable duration like `8 hours` or `2 days`.
        bidSummary:
          type: object
          nullable: true
          properties:
            totalBids:
              type: integer
            activeBidsCount:
              type: integer
            successfulBidsCount:
              type: integer
            highestBidAmount:
              type: number
              nullable: true
            latestBidAmount:
              type: number
              nullable: true
            activeBidders:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: string
                  name:
                    type: string
                  loadWeightKg:
                    type: number
                    nullable: true
                  loadWeightTonnes:
                    type: number
                    nullable: true
                  equivalent50kgBags:
                    type: number
                    nullable: true
                  equivalent100kgBags:
                    type: number
                    nullable: true
                  loadDisplay:
                    type: string
                    nullable: true
            successfulBidders:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: string
                  name:
                    type: string
                  loadWeightKg:
                    type: number
                    nullable: true
                  loadWeightTonnes:
                    type: number
                    nullable: true
                  equivalent50kgBags:
                    type: number
                    nullable: true
                  equivalent100kgBags:
                    type: number
                    nullable: true
                  loadDisplay:
                    type: string
                    nullable: true
        priceUnitLabel:
          type: string
          description: Human-readable pricing unit for frontend display.
        pricePerKgEquivalent:
          type: number
          nullable: true
          description: Backend-calculated price-per-kg equivalent for UI comparison.
        priceNegotiation:
          type: boolean
        fleetDescription:
          type: string
        fleetStates:
          type: string
        status:
          type: string
          enum: [available, on_transit, under_maintenance]
        images:
          type: array
          items:
            type: string
        route:
          type: object
          properties:
            fromState:
              type: string
              nullable: true
            toState:
              type: string
              nullable: true
    Driver:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        phone:
          type: string
        licenseNumber:
          type: string
        trackingNumber:
          type: string
          nullable: true
        assignedTruck:
          oneOf:
            - type: string
            - $ref: '#/components/schemas/Truck'
    Farmer:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        businessName:
          type: string
        nin:
          type: string
        businessCAC:
          type: string
        bankName:
          type: string
        bankAccountName:
          type: string
        bankAccountNumber:
          type: string
        address:
          type: string
        country:
          type: string
        state:
          type: string
        lga:
          type: string
        villageOrLocalMarket:
          type: string
      required:
        - name
        - phone
        - address
        - state
        - lga
        - villageOrLocalMarket
    Order:
      type: object
      properties:
        buyer:
          type: string
        products:
          type: array
          items:
            type: object
            properties:
              product:
                type: string
              quantity:
                type: number
              unitPrice:
                type: number
                nullable: true
              lineSubtotal:
                type: number
                nullable: true
              localTransportRequired:
                type: boolean
              localTransportFee:
                type: number
              localTransportFrom:
                type: string
                nullable: true
              localTransportTo:
                type: string
                nullable: true
              localTransportNote:
                type: string
                nullable: true
        totalAmount:
          type: number
        status:
          type: string
        transportStatus:
          type: string
        transporter:
          type: string
    Transaction:
      type: object
      properties:
        order:
          type: string
        buyer:
          type: string
        amount:
          type: number
        status:
          type: string

security:
  - bearerAuth: []

paths:
  /api/categories:
    get:
      summary: List supported product categories and subcategories
      security: []
      responses:
        '200':
          description: Category tree for buyer and seller filters
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/CategoryNode'
  /api/auth/register:
    post:
      summary: Register a user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                name:
                  type: string
                password:
                  type: string
              required:
                - email
                - name
                - password
            example:
              name: "Enrico Tester"
              email: "enrico.jeiren@flyovertrees.com"
              password: "SecurePass123!"
      responses:
        '201':
          description: User registered (roles default to [] and activeRole is null until account selection)
  /api/auth/login:
    post:
      summary: Login and get JWT token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
            example:
              email: "enrico.jeiren@flyovertrees.com"
              password: "SecurePass123!"
      responses:
        '200':
          description: JWT access token + refresh token (also set as httpOnly cookie)
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  refreshToken:
                    type: string
                  user:
                    $ref: '#/components/schemas/User'
  /api/auth/verify-code:
    post:
      summary: Verify email with code
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                code:
                  type: string
            example:
              email: "enrico.jeiren@flyovertrees.com"
              code: "123456"
      responses:
        '200':
          description: Email verified
  /api/auth/refresh:
    post:
      summary: Refresh access token using refresh token
      description: Accepts `refreshToken` in the JSON body or the `refreshToken` httpOnly cookie. No bearer token is required.
      security: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken:
                  type: string
            description: Optional when the browser already sends the `refreshToken` cookie.
            example:
              refreshToken: "eyJhbGciOi..."
      responses:
        '200':
          description: New access token + refresh token
  /api/auth/logout:
    post:
      summary: Logout and revoke refresh token
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Logged out (refresh revoked, access tokens invalidated)
  /api/orders/{id}/status:
    patch:
      summary: Update order status or transport status
      description: Requires buyer/agent/transporter/admin with proper ownership. Uses activeRole.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [pending, payment_pending, paid, delivered]
                transportStatus:
                  type: string
                  enum: [pending, picked, on_transit, delivered]
                transporter:
                  type: string
            example:
              status: "paid"
              transportStatus: "picked"
              transporter: "507f1f77bcf86cd799439015"
      responses:
        '200':
          description: Updated order
  /api/orders/{id}/parties:
    get:
      summary: Get buyer/seller/transporter parties for an order
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Parties info
  /api/orders/{id}/transporters:
    get:
      summary: List available transporters for a paid, not-yet-shipped order
      description: Buyer (order owner), agent, or admin can fetch transporters only when payment has been approved and the order transport status is still `pending`. This endpoint currently returns transporter accounts that can be browsed for that order flow; it does not yet rank or pre-match transporters by route, size, or capacity.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Transporters list for the order
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      orderId:
                        type: string
                      orderStatus:
                        type: string
                      paymentPendingApproval:
                        type: boolean
                      transportStatus:
                        type: string
                      assignedTransporter:
                        type: string
                        nullable: true
                      transporters:
                        type: array
                        items:
                          $ref: '#/components/schemas/User'
              example:
                success: true
                message: "Available transporters fetched"
                data:
                  orderId: "67deorder1234567890abc111"
                  orderStatus: "paid"
                  paymentPendingApproval: false
                  transportStatus: "pending"
                  assignedTransporter: null
                  transporters:
                    - _id: "67detrans1234567890abc001"
                      name: "North Haul Logistics"
                      email: "transporter@example.com"
                      phone: "+2348001112222"
                      businessName: "North Haul Logistics Ltd"
                      image: "https://example.com/transporter.jpg"
                      country: "Nigeria"
                      state: "Kaduna"
        '400':
          description: Payment is not approved yet or shipping has already started
        '403':
          description: Forbidden for non-owner buyer or unsupported role
  /api/transactions/{id}/status:
    patch:
      summary: Admin updates transaction status
      description: Legacy transaction approval endpoint. Prefer `PATCH /api/admin/transactions/{id}/status` for admin UI flows.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [approved, rejected, pending]
            example:
              status: "approved"
      responses:
        '200':
          description: Updated transaction
  /api/transactions/{id}/contact-customer-care:
    post:
      summary: Create support ticket linked to transaction
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                subject:
                  type: string
                message:
                  type: string
            example:
              subject: "Payment issue"
              message: "I was charged twice."
      responses:
        '201':
          description: Ticket created
  /api/products/{id}/status:
    patch:
      summary: Update product status
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [available, out_of_stock, discontinued]
            example:
              status: "out_of_stock"
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Updated product
  /api/products/out-of-stock:
    get:
      summary: List out-of-stock products
      responses:
        '200':
          description: Out of stock list
  /api/products/bulk/delete:
    post:
      summary: Bulk delete products
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                productIds:
                  type: array
                  items:
                    type: string
            example:
              productIds: ["ID1", "ID2"]
      responses:
        '200':
          description: Delete count
  /api/products/bulk/status:
    patch:
      summary: Bulk update product status
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                productIds:
                  type: array
                  items:
                    type: string
                status:
                  type: string
                  enum: [available, out_of_stock, discontinued]
            example:
              productIds: ["ID1", "ID2"]
              status: "available"
      responses:
        '200':
          description: Updated count
  /api/transporters/fleet:
    get:
      summary: List transporter fleet
      description: Requires activeRole `transporter`. Use `search`, `status`, `year`, and `month` to filter the authenticated transporter's fleet list.
      parameters:
        - in: query
          name: search
          schema:
            type: string
          description: Search by plate number, fleet name, fleet number, model, or IoT id.
        - in: query
          name: status
          schema:
            type: string
            enum: [available, on_transit, under_maintenance]
        - in: query
          name: year
          schema:
            type: integer
        - in: query
          name: month
          schema:
            type: integer
      responses:
        '200':
          description: Fleet list
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Truck'
              example:
                success: true
                data:
                  - _id: "67de1234abcd5678ef901234"
                    plateNumber: "ABC-123"
                    fleetName: "North Route Fleet"
                    fleetNumber: "ABC-123"
                    iot: "IOT-TRK-001"
                    model: "Volvo"
                    size: "20 tons"
                    capacity: "20 tons"
                    price: 250000
                    priceNegotiation: true
                    fleetDescription: "Primary interstate fleet"
                    fleetStates: "Active"
                    status: "available"
                    images:
                      - "https://example.com/truck1.jpg"
                    route:
                      fromState: "Kaduna"
                      toState: "Lagos"
    post:
      summary: Create fleet truck
      description: Preferred payload uses `capacityTonnes` for frontend entry. Backend still accepts `capacity` and `capacityKg` for compatibility, but transporter UI should use tonnes.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                plateNumber: { type: string }
                fleetName: { type: string }
                fleetNumber: { type: string }
                iot: { type: string }
                model: { type: string }
                size: { type: string }
                capacity: { type: string }
                capacityKg: { type: number }
                capacityTonnes: { type: number }
                price: { type: number }
                pricingModel:
                  type: string
                  enum: [flat_rate_whole_truck, per_kg, per_tonne, per_50kg_bag, per_100kg_bag]
                estimatedDeliveryValue: { type: number }
                estimatedDeliveryUnit:
                  type: string
                  enum: [hours, days]
                priceNegotiation: { type: boolean }
                images:
                  type: array
                  items: { type: string }
                fleetDescription: { type: string }
                fleetStates: { type: string }
                route:
                  type: object
                  properties:
                    fromState: { type: string }
                    toState: { type: string }
            example:
              fleetName: "North Route Fleet"
              fleetNumber: "ABC-123"
              iot: "IOT-TRK-001"
              model: "Volvo"
              capacityTonnes: 20
              price: 250000
              pricingModel: "flat_rate_whole_truck"
              estimatedDeliveryValue: 2
              estimatedDeliveryUnit: "days"
              priceNegotiation: true
              images:
                - "https://example.com/truck1.jpg"
              fleetDescription: "Primary interstate fleet"
              fleetStates: "Active"
              route:
                fromState: "Kaduna"
                toState: "Lagos"
      responses:
        '201':
          description: Truck created
  /api/transporters/fleets:
    get:
      summary: Alias of /api/transporters/fleet (list transporter fleet)
      description: Backward-compatible alias route.
      parameters:
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: status
          schema:
            type: string
            enum: [available, on_transit, under_maintenance]
        - in: query
          name: year
          schema:
            type: integer
        - in: query
          name: month
          schema:
            type: integer
      responses:
        '200':
          description: Fleet list
    post:
      summary: Alias of /api/transporters/fleet (create fleet truck)
      description: Backward-compatible alias route.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                plateNumber: { type: string }
                fleetName: { type: string }
                name: { type: string }
                fleetNumber: { type: string }
                iot: { type: string }
                Iot: { type: string }
                tracker: { type: string }
                model: { type: string }
                size: { type: string }
                capacity: { type: string }
                capacityKg: { type: number }
                price: { type: number }
                pricingModel:
                  type: string
                  enum: [flat_rate_whole_truck, per_kg, per_tonne, per_50kg_bag, per_100kg_bag]
                estimatedDeliveryValue: { type: number }
                estimatedDeliveryUnit:
                  type: string
                  enum: [hours, days]
                priceNegotiation: { type: boolean }
                images:
                  type: array
                  items: { type: string }
                fleetDescription: { type: string }
                fleetStates: { type: string }
                route:
                  type: object
                  properties:
                    fromState: { type: string }
                    toState: { type: string }
      responses:
        '201':
          description: Truck created
  /api/transporters/fleet/{id}:
    get:
      summary: Get single truck
      description: Requires activeRole `transporter`. Returns one fleet/truck owned by the authenticated transporter.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Truck details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/Truck'
              example:
                success: true
                data:
                  _id: "67de1234abcd5678ef901234"
                  plateNumber: "ABC-123"
                  fleetName: "North Route Fleet"
                  fleetNumber: "ABC-123"
                  iot: "IOT-TRK-001"
                  model: "Volvo"
                  size: "20 tonnes"
                  capacity: "20 tons"
                  capacityKg: 20000
                  currentLoadKg: 0
                  remainingCapacityKg: 20000
                  remainingCapacityDisplay: "20 tons"
                  price: 250000
                  pricingModel: "flat_rate_whole_truck"
                  wholeTruckOnly: true
                  estimatedDeliveryValue: 2
                  estimatedDeliveryUnit: "days"
                  estimatedDeliveryText: "2 days"
                  priceUnitLabel: "whole truck"
                  pricePerKgEquivalent: 12.5
                  priceNegotiation: true
                  fleetDescription: "Primary interstate fleet"
                  fleetStates: "Active"
                  status: "available"
                  images:
                    - "https://example.com/truck1.jpg"
                  route:
                    fromState: "Kaduna"
                    toState: "Lagos"
    patch:
      summary: Update truck
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                plateNumber: { type: string }
                fleetName: { type: string }
                name: { type: string }
                fleetNumber: { type: string }
                iot: { type: string }
                Iot: { type: string }
                model: { type: string }
                size: { type: string }
                capacity: { type: string }
                capacityKg: { type: number }
                price: { type: number }
                pricingModel:
                  type: string
                  enum: [flat_rate_whole_truck, per_kg, per_tonne, per_50kg_bag, per_100kg_bag]
                estimatedDeliveryValue: { type: number }
                estimatedDeliveryUnit:
                  type: string
                  enum: [hours, days]
                priceNegotiation: { type: boolean }
                images:
                  type: array
                  items: { type: string }
                fleetDescription: { type: string }
                fleetStates: { type: string }
                route:
                  type: object
                  properties:
                    fromState: { type: string }
                    toState: { type: string }
            example:
              model: "MAN"
              capacity: "18 tons"
              pricingModel: "per_tonne"
              estimatedDeliveryValue: 8
              estimatedDeliveryUnit: "hours"
      responses:
        '200':
          description: Updated truck
    delete:
      summary: Delete truck
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deleted
  /api/transporters/fleet/{id}/bids:
    get:
      summary: List fleet price bids
      description: Buyers see only their own bids for the fleet. The owning transporter sees all bids for that fleet. The path `id` is the fleet or truck id, not the bid id. Each bid now includes shipment load details so transporters can see the requested weight in kg, tonnes, and bag equivalents.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Fleet bids list
          content:
            application/json:
              example:
                success: true
                data:
                  - _id: "67defleetbid1234567890abc"
                    amount: 180000
                    loadWeightKg: 5000
                    loadWeightTonnes: 5
                    equivalent50kgBags: 100
                    equivalent100kgBags: 50
                    loadDisplay: "5 tonnes"
                    counterAmount: null
                    message: "Can you do 180k for this route?"
                    responseMessage: null
                    status: "pending"
                    buyer:
                      _id: "67debuyer1234567890abc1"
                      name: "Buyer One"
