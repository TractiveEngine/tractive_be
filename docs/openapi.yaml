        '200':
          description: List of orders
    post:
      summary: Create order
      description: Use this after `/api/buyers/biddings/won` or `/api/buyers/biddings/won/checkout` to create an order from accepted bids. Requires `activeRole` to be `buyer`. `totalAmount` must include accepted bid totals plus any seller-configured local transport fees on the selected products.
      security:
        - bearerAuth: []
      parameters:
        - in: header
          name: Idempotency-Key
          schema:
            type: string
          description: Prevent duplicate orders on retry. Reuse the same key to get the existing order.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Order'
            example:
              products:
                - product: "507f1f77bcf86cd799439013"
                  quantity: 10
              totalAmount: 52500
              address: "123 Delivery Street, Abuja"
              transportStatus: "pending"
              bidIds:
                - "507f1f77bcf86cd799439099"
      responses:
        '201':
          description: Order created
