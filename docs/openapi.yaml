openapi: 3.0.0
info:
  title: Tractive API
  version: 1.0.0
  description: API documentation for Tractive backend

servers:
  - url: http://localhost:3000

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        email:
          type: string
        name:
          type: string
        roles:
          type: array
          items:
            type: string
        activeRole:
          type: string
        isVerified:
          type: boolean
    Product:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        description:
          type: string
        price:
          type: number
        quantity:
          type: number
        discount:
          type: number
        images:
          type: array
          items:
            type: string
          description: Image URLs (Cloudinary/S3). No base64 data.
        videos:
          type: array
          items:
            type: string
          description: Video URLs (Cloudinary/S3). No base64 data.
        category:
          type: string
          nullable: true
        subcategory:
          type: string
          nullable: true
        categories:
          type: array
          items:
            type: string
          description: Normalized category list including category and subcategory.
        wishlisted:
          type: boolean
          description: True when the authenticated buyer has wishlisted the product.
        localTransport:
          type: object
          properties:
            required:
              type: boolean
            fee:
              type: number
            from:
              type: string
              nullable: true
            to:
              type: string
              nullable: true
            note:
              type: string
              nullable: true
    CategoryNode:
      type: object
      properties:
        name:
          type: string
        subcategories:
          type: array
          items:
            type: string
    Truck:
      type: object
      properties:
        _id:
          type: string
        plateNumber:
          type: string
        fleetName:
          type: string
        fleetNumber:
          type: string
        iot:
          type: string
          nullable: true
        model:
          type: string
        size:
          type: string
        capacity:
          type: string
        price:
          type: number
        priceNegotiation:
          type: boolean
        fleetDescription:
          type: string
        fleetStates:
          type: string
        status:
          type: string
          enum: [available, on_transit, under_maintenance]
        images:
          type: array
          items:
            type: string
        route:
          type: object
          properties:
            fromState:
              type: string
              nullable: true
            toState:
              type: string
              nullable: true
    Driver:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        phone:
          type: string
        licenseNumber:
          type: string
        trackingNumber:
          type: string
          nullable: true
        assignedTruck:
          oneOf:
            - type: string
            - $ref: '#/components/schemas/Truck'
    Farmer:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        businessName:
          type: string
        nin:
          type: string
        businessCAC:
          type: string
        bankName:
          type: string
        bankAccountName:
          type: string
        bankAccountNumber:
          type: string
        address:
          type: string
        country:
          type: string
        state:
          type: string
        lga:
          type: string
        villageOrLocalMarket:
          type: string
      required:
        - name
        - phone
        - address
        - state
        - lga
        - villageOrLocalMarket
    Order:
      type: object
      properties:
        buyer:
          type: string
        products:
          type: array
          items:
            type: object
            properties:
              product:
                type: string
              quantity:
                type: number
              unitPrice:
                type: number
                nullable: true
              lineSubtotal:
                type: number
                nullable: true
              localTransportRequired:
                type: boolean
              localTransportFee:
                type: number
              localTransportFrom:
                type: string
                nullable: true
              localTransportTo:
                type: string
                nullable: true
              localTransportNote:
                type: string
                nullable: true
        totalAmount:
          type: number
        status:
          type: string
        transportStatus:
          type: string
        transporter:
          type: string
    Transaction:
      type: object
      properties:
        order:
          type: string
        buyer:
          type: string
        amount:
          type: number
        status:
          type: string

security:
  - bearerAuth: []

paths:
  /api/categories:
    get:
      summary: List supported product categories and subcategories
      security: []
      responses:
        '200':
          description: Category tree for buyer and seller filters
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/CategoryNode'
  /api/auth/register:
    post:
      summary: Register a user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                name:
                  type: string
                password:
                  type: string
              required:
                - email
                - name
                - password
            example:
              name: "Enrico Tester"
              email: "enrico.jeiren@flyovertrees.com"
              password: "SecurePass123!"
      responses:
        '201':
          description: User registered (roles default to [] and activeRole is null until account selection)
  /api/auth/login:
    post:
      summary: Login and get JWT token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
            example:
              email: "enrico.jeiren@flyovertrees.com"
              password: "SecurePass123!"
      responses:
        '200':
          description: JWT access token + refresh token (also set as httpOnly cookie)
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  refreshToken:
                    type: string
                  user:
                    $ref: '#/components/schemas/User'
  /api/auth/verify-code:
    post:
      summary: Verify email with code
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                code:
                  type: string
            example:
              email: "enrico.jeiren@flyovertrees.com"
              code: "123456"
      responses:
        '200':
          description: Email verified
  /api/auth/refresh:
    post:
      summary: Refresh access token using refresh token
      description: Accepts `refreshToken` in the JSON body or the `refreshToken` httpOnly cookie. No bearer token is required.
      security: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken:
                  type: string
            description: Optional when the browser already sends the `refreshToken` cookie.
            example:
              refreshToken: "eyJhbGciOi..."
      responses:
        '200':
          description: New access token + refresh token
  /api/auth/logout:
    post:
      summary: Logout and revoke refresh token
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Logged out (refresh revoked, access tokens invalidated)
  /api/orders/{id}/status:
    patch:
      summary: Update order status or transport status
      description: Requires buyer/agent/transporter/admin with proper ownership. Uses activeRole.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [pending, payment_pending, paid, delivered]
                transportStatus:
                  type: string
                  enum: [pending, picked, on_transit, delivered]
                transporter:
                  type: string
            example:
              status: "paid"
              transportStatus: "picked"
              transporter: "507f1f77bcf86cd799439015"
      responses:
        '200':
          description: Updated order
  /api/orders/{id}/parties:
    get:
      summary: Get buyer/seller/transporter parties for an order
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Parties info
  /api/orders/{id}/transporters:
    get:
      summary: List available transporters for a paid, not-yet-shipped order
      description: Buyer (order owner), agent, or admin can fetch transporters only when payment has been approved and the order transport status is still `pending`. This endpoint currently returns transporter accounts that can be browsed for that order flow; it does not yet rank or pre-match transporters by route, size, or capacity.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Transporters list for the order
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      orderId:
                        type: string
                      orderStatus:
                        type: string
                      paymentPendingApproval:
                        type: boolean
                      transportStatus:
                        type: string
                      assignedTransporter:
                        type: string
                        nullable: true
                      transporters:
                        type: array
                        items:
                          $ref: '#/components/schemas/User'
              example:
                success: true
                message: "Available transporters fetched"
                data:
                  orderId: "67deorder1234567890abc111"
                  orderStatus: "paid"
                  paymentPendingApproval: false
                  transportStatus: "pending"
                  assignedTransporter: null
                  transporters:
                    - _id: "67detrans1234567890abc001"
                      name: "North Haul Logistics"
                      email: "transporter@example.com"
                      phone: "+2348001112222"
                      businessName: "North Haul Logistics Ltd"
                      image: "https://example.com/transporter.jpg"
                      country: "Nigeria"
                      state: "Kaduna"
        '400':
          description: Payment is not approved yet or shipping has already started
        '403':
          description: Forbidden for non-owner buyer or unsupported role
  /api/transactions/{id}/status:
    patch:
      summary: Admin updates transaction status
      description: Canonical transaction status update endpoint.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [approved, rejected, pending]
            example:
              status: "approved"
      responses:
        '200':
          description: Updated transaction
  /api/transactions/{id}/contact-customer-care:
    post:
      summary: Create support ticket linked to transaction
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                subject:
                  type: string
                message:
                  type: string
            example:
              subject: "Payment issue"
              message: "I was charged twice."
      responses:
        '201':
          description: Ticket created
  /api/products/{id}/status:
    patch:
      summary: Update product status
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [available, out_of_stock, discontinued]
            example:
              status: "out_of_stock"
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Updated product
  /api/products/out-of-stock:
    get:
      summary: List out-of-stock products
      responses:
        '200':
          description: Out of stock list
  /api/products/bulk/delete:
    post:
      summary: Bulk delete products
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                productIds:
                  type: array
                  items:
                    type: string
            example:
              productIds: ["ID1", "ID2"]
      responses:
        '200':
          description: Delete count
  /api/products/bulk/status:
    patch:
      summary: Bulk update product status
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                productIds:
                  type: array
                  items:
                    type: string
                status:
                  type: string
                  enum: [available, out_of_stock, discontinued]
            example:
              productIds: ["ID1", "ID2"]
              status: "available"
      responses:
        '200':
          description: Updated count
  /api/transporters/fleet:
    get:
      summary: List transporter fleet
      description: Requires activeRole `transporter`. Use `search`, `status`, `year`, and `month` to filter the authenticated transporter's fleet list.
      parameters:
        - in: query
          name: search
          schema:
            type: string
          description: Search by plate number, fleet name, fleet number, model, or IoT id.
        - in: query
          name: status
          schema:
            type: string
            enum: [available, on_transit, under_maintenance]
        - in: query
          name: year
          schema:
            type: integer
        - in: query
          name: month
          schema:
            type: integer
      responses:
        '200':
          description: Fleet list
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Truck'
              example:
                success: true
                data:
                  - _id: "67de1234abcd5678ef901234"
                    plateNumber: "ABC-123"
                    fleetName: "North Route Fleet"
                    fleetNumber: "ABC-123"
                    iot: "IOT-TRK-001"
                    model: "Volvo"
                    size: "20 tons"
                    capacity: "20 tons"
                    price: 250000
                    priceNegotiation: true
                    fleetDescription: "Primary interstate fleet"
                    fleetStates: "Active"
                    status: "available"
                    images:
                      - "https://example.com/truck1.jpg"
                    route:
                      fromState: "Kaduna"
                      toState: "Lagos"
    post:
      summary: Create fleet truck
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                plateNumber: { type: string }
                fleetName: { type: string }
                fleetNumber: { type: string }
                iot: { type: string }
                model: { type: string }
                size: { type: string }
                capacity: { type: string }
                price: { type: number }
                priceNegotiation: { type: boolean }
                images:
                  type: array
                  items: { type: string }
                fleetDescription: { type: string }
                fleetStates: { type: string }
                route:
                  type: object
                  properties:
                    fromState: { type: string }
                    toState: { type: string }
            example:
              fleetName: "North Route Fleet"
              fleetNumber: "ABC-123"
              iot: "IOT-TRK-001"
              model: "Volvo"
              size: "20 tons"
              price: 250000
              priceNegotiation: true
              images:
                - "https://example.com/truck1.jpg"
              fleetDescription: "Primary interstate fleet"
              fleetStates: "Active"
              route:
                fromState: "Kaduna"
                toState: "Lagos"
      responses:
        '201':
          description: Truck created
  /api/transporters/fleets:
    get:
      summary: Alias of /api/transporters/fleet (list transporter fleet)
      description: Backward-compatible alias route.
      parameters:
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: status
          schema:
            type: string
            enum: [available, on_transit, under_maintenance]
        - in: query
          name: year
          schema:
            type: integer
        - in: query
          name: month
          schema:
            type: integer
      responses:
        '200':
          description: Fleet list
    post:
      summary: Alias of /api/transporters/fleet (create fleet truck)
      description: Backward-compatible alias route.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                plateNumber: { type: string }
                fleetName: { type: string }
                name: { type: string }
                fleetNumber: { type: string }
                iot: { type: string }
                Iot: { type: string }
                tracker: { type: string }
                model: { type: string }
                size: { type: string }
                capacity: { type: string }
                price: { type: number }
                priceNegotiation: { type: boolean }
                images:
                  type: array
                  items: { type: string }
                fleetDescription: { type: string }
                fleetStates: { type: string }
                route:
                  type: object
                  properties:
                    fromState: { type: string }
                    toState: { type: string }
      responses:
        '201':
          description: Truck created
  /api/transporters/fleet/{id}:
    get:
      summary: Get single truck
      description: Requires activeRole `transporter`. Returns one fleet/truck owned by the authenticated transporter.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Truck details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/Truck'
              example:
                success: true
                data:
                  _id: "67de1234abcd5678ef901234"
                  plateNumber: "ABC-123"
                  fleetName: "North Route Fleet"
                  fleetNumber: "ABC-123"
                  iot: "IOT-TRK-001"
                  model: "Volvo"
                  size: "20 tons"
                  capacity: "20 tons"
                  price: 250000
                  priceNegotiation: true
                  fleetDescription: "Primary interstate fleet"
                  fleetStates: "Active"
                  status: "available"
                  images:
                    - "https://example.com/truck1.jpg"
                  route:
                    fromState: "Kaduna"
                    toState: "Lagos"
    patch:
      summary: Update truck
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                plateNumber: { type: string }
                fleetName: { type: string }
                name: { type: string }
                fleetNumber: { type: string }
                iot: { type: string }
                Iot: { type: string }
                model: { type: string }
                size: { type: string }
                capacity: { type: string }
                price: { type: number }
                priceNegotiation: { type: boolean }
                images:
                  type: array
                  items: { type: string }
                fleetDescription: { type: string }
                fleetStates: { type: string }
                route:
                  type: object
                  properties:
                    fromState: { type: string }
                    toState: { type: string }
            example:
              model: "MAN"
              capacity: "18 tons"
      responses:
        '200':
          description: Updated truck
    delete:
      summary: Delete truck
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deleted
  /api/transporters/fleet/{id}/bids:
    get:
      summary: List fleet price bids
      description: Buyers see only their own bids for the fleet. The owning transporter sees all bids for that fleet.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Fleet bids list
          content:
            application/json:
              example:
                success: true
                data:
                  - _id: "67defleetbid1234567890abc"
                    amount: 180000
                    counterAmount: null
                    message: "Can you do 180k for this route?"
                    responseMessage: null
                    status: "pending"
                    buyer:
                      _id: "67debuyer1234567890abc1"
                      name: "Buyer One"
                      email: "buyer@example.com"
                    fleet:
                      _id: "67de1234abcd5678ef901234"
                      plateNumber: "ABC-123"
                      fleetName: "North Route Fleet"
                      fleetNumber: "ABC-123"
                      model: "Volvo"
                      price: 250000
    post:
      summary: Create fleet price bid
      description: Requires activeRole `buyer`. Creates a price bid against a fleet/truck on the transporter page.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                amount:
                  type: number
                proposedPrice:
                  type: number
                message:
                  type: string
            example:
              amount: 180000
              message: "Can you do 180k for this route?"
      responses:
        '201':
          description: Fleet bid created
          content:
            application/json:
              example:
                success: true
                data:
                  _id: "67defleetbid1234567890abc"
                  amount: 180000
                  status: "pending"
                  message: "Can you do 180k for this route?"
                  buyer:
                    _id: "67debuyer1234567890abc1"
                    name: "Buyer One"
                  fleet:
                    _id: "67de1234abcd5678ef901234"
                    plateNumber: "ABC-123"
                    fleetName: "North Route Fleet"
  /api/transporters/fleets/{id}:
    get:
      summary: Alias of /api/transporters/fleet/{id} (get single truck)
      description: Backward-compatible alias route.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Truck details
    patch:
      summary: Alias of /api/transporters/fleet/{id} (update truck)
      description: Backward-compatible alias route.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                plateNumber: { type: string }
                fleetName: { type: string }
                name: { type: string }
                fleetNumber: { type: string }
                iot: { type: string }
                Iot: { type: string }
                model: { type: string }
                size: { type: string }
                capacity: { type: string }
                price: { type: number }
                priceNegotiation: { type: boolean }
                images:
                  type: array
                  items: { type: string }
                fleetDescription: { type: string }
                fleetStates: { type: string }
                route:
                  type: object
                  properties:
                    fromState: { type: string }
                    toState: { type: string }
      responses:
        '200':
          description: Updated truck
    delete:
      summary: Alias of /api/transporters/fleet/{id} (delete truck)
      description: Backward-compatible alias route.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deleted
  /api/transporters/fleets/{id}/bids:
    get:
      summary: Alias of /api/transporters/fleet/{id}/bids (list fleet price bids)
      description: Backward-compatible alias route.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Fleet bids list
    post:
      summary: Alias of /api/transporters/fleet/{id}/bids (create fleet price bid)
      description: Backward-compatible alias route.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '201':
          description: Fleet bid created
  /api/transporters/fleet/{id}/bids/{bidId}/respond:
    post:
      summary: Respond to fleet price bid
      description: Requires activeRole `transporter` and ownership of the fleet. Supports `accept`, `reject`, or `counter`.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: path
          name: bidId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                action:
                  type: string
                  enum: [accept, reject, counter]
                counterAmount:
                  type: number
                amount:
                  type: number
                message:
                  type: string
            example:
              action: "counter"
              counterAmount: 210000
              message: "Best I can do is 210k"
      responses:
        '200':
          description: Fleet bid updated
          content:
            application/json:
              example:
