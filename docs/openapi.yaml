      parameters:
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: limit
          schema:
            type: integer
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: status
          schema:
            type: string
            enum: [available, out_of_stock, discontinued]
        - in: query
          name: category
          schema:
            type: string
        - in: query
          name: subcategory
          schema:
            type: string
        - in: query
          name: farmer
          schema:
            type: string
        - in: query
          name: owner
          schema:
            type: string
        - in: query
          name: minPrice
          schema:
            type: number
        - in: query
          name: maxPrice
          schema:
            type: number
        - in: query
          name: from
          schema:
            type: string
            format: date-time
        - in: query
          name: to
          schema:
            type: string
            format: date-time
        - in: query
          name: sortBy
          schema:
            type: string
        - in: query
          name: sortOrder
          schema:
            type: string
            enum: [asc, desc]
        - in: query
          name: full
          schema:
            type: boolean
          description: Return full product documents (default is compact list)
        - in: query
          name: includeMedia
          schema:
            type: boolean
          description: Include images/videos in compact list (default true)
      responses:
        '200':
          description: Paginated list of products
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Product'
                  products:
                    type: array
                    items:
                      $ref: '#/components/schemas/Product'
                  pagination:
                    type: object
                    properties:
                      page:
                        type: integer
                      limit:
                        type: integer
                      total:
                        type: integer
    post:
      summary: Create product
      description: Requires `activeRole` to be `agent` or `admin`. Preferred category shape is `category` + `subcategory` + `categories`, while `localTransport` describes seller-side farm-to-pickup movement that is later added into buyer checkout totals.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Product'
            example:
              name: "Fresh Maize"
              description: "High quality yellow maize from Kaduna farms"
              price: 3800
              quantity: 100
              discount: 10
              unit: "kg"
              category: "Grains"
              subcategory: "Maize"
              categories: ["Grains", "Maize"]
              images: ["https://example.com/maize1.jpg"]
              videos: ["https://example.com/maize1.mp4"]
              farmer: "507f1f77bcf86cd799439012"
              localTransport:
                required: true
                fee: 2500
                from: "Kachia Farm"
                to: "Kaduna Aggregation Point"
                note: "Farm gate pickup to interstate loading point"
      responses:
        '201':
          description: Product created
          content:
            application/json:
              example:
                message: "Product created successfully"
                product:
                  _id: "67deprod1234567890abcd1"
                  name: "Fresh Maize"
                  description: "High quality yellow maize from Kaduna farms"
                  price: 3800
                  quantity: 100
                  discount: 10
                  unit: "kg"
                  owner: "67deagent1234567890abc1"
                  farmer: "507f1f77bcf86cd799439012"
                  images: ["https://example.com/maize1.jpg"]
                  videos: ["https://example.com/maize1.mp4"]
                  status: "available"
                  category: "Grains"
                  subcategory: "Maize"
                  categories: ["Grains", "Maize"]
                  localTransport:
                    required: true
                    fee: 2500
                    from: "Kachia Farm"
                    to: "Kaduna Aggregation Point"
                    note: "Farm gate pickup to interstate loading point"
